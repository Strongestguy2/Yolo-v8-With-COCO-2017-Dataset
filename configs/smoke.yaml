seed: 42
device: auto

model:
  num_classes: 80
  image_size: 128
  backbone: resnet34
  pretrained_backbone: false
  fpn_channels: 32
  head_channels: 32
  freeze_backbone_epochs: 999

data:
  root: data/smoke_coco_yolo
  state_path: data/smoke_state.json
  train_samples: 40
  val_samples: 10
  seed: 42

augmentation:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.3
  hflip_p: 0.5

loss:
  obj_weight: 1.0
  cls_weight: 1.0
  box_weight: 5.0
  l1_weight: 0.25
  focal_alpha: 0.25
  focal_gamma: 2.0

train:
  run_name: smoke
  output_dir: outputs/runs
  epochs: 2
  batch_size: 2
  val_batch_size: 2
  workers: 0
  pin_memory: false
  drop_last: false
  grad_accum: 1
  lr: 0.001
  min_lr_ratio: 0.05
  weight_decay: 0.01
  warmup_steps: 2
  total_steps: 20
  amp: false
  grad_clip_norm: 5.0
  checkpoint_steps: 2
  checkpoint_minutes: 60
  val_max_batches: 2
